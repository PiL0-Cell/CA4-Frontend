<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrukFlix - Your Page Title</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font Lato -->
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Lato', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-[#121212] text-white font-sans">
    <nav class="bg-black/95 backdrop-blur-sm border-b border-gray-800 fixed top-0 w-full z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <a href="index.html" class="flex items-center gap-2">
                    <img src="assets/Hero/Logo.png" alt="Logo" class="h-8">
                    <span class="text-xl font-bold">DRUK<span class="text-red-600">FLIX</span></span>
                </a>

                <!-- Navigation Links -->
                <div class="hidden md:flex gap-6">
                    <a href="index.html" class="nav-link hover:text-red-500">Home</a>
                    <a href="movies.html" class="nav-link hover:text-red-500">Movies</a>
                    <a href="about-us.html" class="nav-link hover:text-red-500">About</a>
                    <a href="faq.html" class="nav-link hover:text-red-500">FAQ</a>
                </div>

                <!-- Search Bar -->
                <div class="hidden md:block flex-1 max-w-md">
                    <input type="text" id="searchInput" placeholder="Search movies..."
                        class="w-full bg-gray-900 border border-gray-700 rounded-lg py-2 px-4 text-white">
                </div>

                <!-- Login/Signup or User Menu -->
                <div id="authButtons" class="flex gap-3">
                    <!-- JS will fill this -->
                </div>

                <!-- Mobile Menu Button -->
                <button id="mobileBtn" class="md:hidden text-white text-2xl">☰</button>
            </div>

            <!-- Mobile Menu (hidden by default) -->
            <div id="mobileMenu" class="hidden md:hidden pb-4">
                <a href="index.html" class="block py-2">Home</a>
                <a href="movies.html" class="block py-2">Movies</a>
                <a href="about-us.html" class="block py-2">About</a>
                <a href="faq.html" class="block py-2">FAQ</a>
                <input type="text" id="mobileSearch" placeholder="Search..."
                    class="w-full bg-gray-900 border border-gray-700 rounded-lg py-2 px-4 mt-2">
                <div id="mobileAuth" class="mt-2"></div>
            </div>
        </div>
    </nav>
    <div class="h-16"></div>

    <main class="max-w-7xl mx-auto px-4 py-8">

        <!-- Results Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold mb-2">Search Results</h1>
            <div id="searchInfo" class="text-gray-400">
                <!-- Search info will appear here -->
            </div>
        </div>

        <!-- Results Grid -->
        <div id="resultsGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <!-- Results will be populated here -->
        </div>

    </main>

    <footer class="bg-black/50 border-t border-gray-800 mt-20">
        <div class="max-w-7xl mx-auto px-4 py-8">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <div>
                    <h4 class="font-bold mb-3">DRUKFLIX</h4>
                    <p class="text-sm text-gray-400">Bhutanese Cinema Streaming</p>
                </div>
                <div>
                    <h4 class="font-semibold mb-3">Explore</h4>
                    <ul class="text-sm text-gray-400 space-y-1">
                        <li><a href="movies.html" class="hover:text-red-500">Movies</a></li>
                        <li><a href="about-us.html" class="hover:text-red-500">About</a></li>
                        <li><a href="faq.html" class="hover:text-red-500">FAQ</a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="font-semibold mb-3">Account</h4>
                    <ul class="text-sm text-gray-400 space-y-1">
                        <li><a href="account.html" class="hover:text-red-500">Account</a></li>
                        <li><a href="History.html" class="hover:text-red-500">History</a></li>
                        <li><a href="change-password.html" class="hover:text-red-500">Change Password</a></li>
                    </ul>
                </div>
                <div>
                    <h4 class="font-semibold mb-3">Legal</h4>
                    <ul class="text-sm text-gray-400 space-y-1">
                        <li><a href="#">Terms</a></li>
                        <li><a href="#">Privacy</a></li>
                    </ul>
                </div>
            </div>
            <div class="text-center text-sm text-gray-400 pt-6 mt-6 border-t border-gray-800">
                <p>&copy; 2024 DrukFlix - All Rights Reserved</p>
            </div>
        </div>
    </footer>
    <!-- Script -->
    <script src="js/script.js"></script>
    <script>
        function getSearchQuery() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('q') || '';
        }

        // Search movies function
        function searchMovies(query) {
            if (!query || query.trim() === '') {
                return [];
            }

            const searchTerm = query.toLowerCase().trim();

            return window.moviesArray.filter(movie => {
                return movie.title.toLowerCase().includes(searchTerm) ||
                    movie.genres.some(genre => genre.toLowerCase().includes(searchTerm)) ||
                    movie.year.toString().includes(searchTerm);
            });
        }

        // Display results
        function displayResults(results, query) {
            const resultsGrid = document.getElementById('resultsGrid');
            const searchInfo = document.getElementById('searchInfo');

            if (!query || query.trim() === '') {
                searchInfo.innerHTML = '<p class="text-yellow-500">No search term provided</p>';
                resultsGrid.innerHTML = `
                    <div class="col-span-full text-center py-16">
                        <div class="text-6xl mb-4">🔍</div>
                        <h3 class="text-xl font-semibold mb-2">No search term</h3>
                        <p class="text-gray-400">Use the search bar in the navigation to find movies</p>
                    </div>
                `;
                return;
            }

            if (results.length === 0) {
                searchInfo.innerHTML = `<p>Found <span class="text-red-400">0</span> results for "<span class="font-semibold">${query}</span>"</p>`;
                resultsGrid.innerHTML = `
                    <div class="col-span-full text-center py-16">
                        <div class="text-6xl mb-4">😢</div>
                        <h3 class="text-xl font-semibold mb-2">No results found for "${query}"</h3>
                        <p class="text-gray-400">Try searching for: Drama, Horror, Romance, 2023, Lunana, etc.</p>
                    </div>
                `;
                return;
            }

            searchInfo.innerHTML = `<p>Found <span class="text-red-400">${results.length}</span> result${results.length !== 1 ? 's' : ''} for "<span class="font-semibold">${query}</span>"</p>`;

            resultsGrid.innerHTML = results.map(movie => `
                <div onclick="showMovieModal('${movie.title}')" class="cursor-pointer group">
                    <img src="${movie.icon}" 
                         alt="${movie.title}"
                         class="w-full aspect-[2/3] object-cover rounded-lg transition transform group-hover:scale-105">
                    <h3 class="mt-2 font-semibold text-sm line-clamp-1">${movie.title}</h3>
                    <div class="flex justify-between items-center mt-1">
                        <span class="text-xs text-yellow-500">★ ${movie.rating}</span>
                        <span class="text-xs text-gray-500">${movie.year}</span>
                    </div>
                    <div class="flex flex-wrap gap-1 mt-1">
                        ${movie.genres.slice(0, 2).map(genre => `
                            <span class="text-xs text-gray-500">${genre}</span>
                        `).join(', ')}
                    </div>
                </div>
            `).join('');
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            const query = getSearchQuery();
            const results = searchMovies(query);
            displayResults(results, query);
        });
    </script>
</body>

</html>
